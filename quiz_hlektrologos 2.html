<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Τεχνικός Ηλεκτρολογικών Συστημάτων</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    max-width: 800px;
    width: 100%;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #1a237e, #1565c0);
    color: white;
    padding: 28px 32px;
    text-align: center;
  }
  .header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 0.9rem; opacity: 0.85; }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    background: #e8eaf6;
    padding: 14px;
    font-size: 0.88rem;
    color: #3949ab;
    font-weight: 600;
  }
  .stats-bar span { display: flex; align-items: center; gap: 6px; }
  .question-area { padding: 32px; }
  .question-num {
    font-size: 0.8rem;
    color: #9e9e9e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.6;
    color: #212121;
    margin-bottom: 24px;
    font-weight: 500;
  }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 0.97rem;
    color: #333;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
  }
  .option:hover:not(.disabled) { border-color: #1565c0; background: #e8f0fe; }
  .option .letter {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #e8eaf6;
    color: #3949ab;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .option.correct { border-color: #2e7d32; background: #e8f5e9; }
  .option.correct .letter { background: #2e7d32; color: white; }
  .option.wrong { border-color: #c62828; background: #ffebee; }
  .option.wrong .letter { background: #c62828; color: white; }
  .option.show-correct { border-color: #2e7d32; background: #e8f5e9; }
  .option.show-correct .letter { background: #2e7d32; color: white; }
  .option.disabled { cursor: default; }
  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.95rem;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .feedback.correct { background: #e8f5e9; color: #2e7d32; display: flex; }
  .feedback.wrong { background: #ffebee; color: #c62828; display: flex; }
  .actions { padding: 0 32px 32px; display: flex; gap: 12px; justify-content: flex-end; }
  .btn {
    padding: 12px 28px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: #1565c0; color: white; }
  .btn-primary:hover { background: #0d47a1; }
  .btn-secondary { background: #e8eaf6; color: #3949ab; }
  .btn-secondary:hover { background: #c5cae9; }
  .progress-bar {
    height: 4px;
    background: #e0e0e0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1565c0, #42a5f5);
    transition: width 0.4s ease;
  }
  .result-screen {
    padding: 48px 32px;
    text-align: center;
    display: none;
  }
  .result-screen h2 { font-size: 2rem; color: #1a237e; margin-bottom: 12px; }
  .result-screen .score { font-size: 3.5rem; font-weight: 700; color: #1565c0; margin: 16px 0; }
  .result-screen p { color: #555; font-size: 1rem; margin-bottom: 24px; }
  .result-screen .grade {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 32px;
  }
  .grade.excellent { background: #e8f5e9; color: #2e7d32; }
  .grade.good { background: #e3f2fd; color: #1565c0; }
  .grade.average { background: #fff8e1; color: #f57f17; }
  .grade.poor { background: #ffebee; color: #c62828; }
  table.results-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    text-align: left;
    font-size: 0.88rem;
  }
  table.results-table th {
    background: #e8eaf6;
    padding: 8px 12px;
    color: #3949ab;
  }
  table.results-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .icon { font-size: 1.2rem; }
  @media (max-width: 500px) {
    .question-area, .actions { padding: 20px; }
    .header { padding: 20px; }
    .stats-bar { gap: 16px; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔌 Τεχνικός Ηλεκτρολογικών Συστημάτων</h1>
    <p>Εγκαταστάσεων και Δικτύων – Θεωρητικό Quiz</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="stats-bar">
    <span>📋 Ερώτηση <span id="qNum">1</span> / <span id="qTotal">10</span></span>
    <span>✅ Σωστές: <span id="correctCount">0</span></span>
    <span>❌ Λάθος: <span id="wrongCount">0</span></span>
  </div>

  <!-- Question Screen -->
  <div id="quizScreen">
    <div class="question-area">
      <div class="question-num" id="questionNum">Ερώτηση 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback">
        <span class="icon" id="feedbackIcon"></span>
        <span id="feedbackText"></span>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="skipQuestion()">Παράλειψη ⏭</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">Επόμενη →</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="result-screen" id="resultScreen">
    <div style="font-size:3rem">🏆</div>
    <h2>Αποτελέσματα</h2>
    <div class="score" id="finalScore"></div>
    <p id="finalDesc"></p>
    <div class="grade" id="gradeLabel"></div>
    <br>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-right:10px">🔄 Νέο Quiz</button>
    <button class="btn btn-secondary" onclick="showDetails()">📊 Αναλυτικά</button>
    <div id="detailsTable" style="display:none; margin-top:24px; text-align:left; overflow-x:auto;"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  },

// Quiz state
let questions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let history = [];
const TOTAL_Q = 10;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(ALL_QUESTIONS).slice(0, TOTAL_Q);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  history = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('qTotal').textContent = TOTAL_Q;
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[currentIndex];
  document.getElementById('qNum').textContent = currentIndex + 1;
  document.getElementById('questionNum').textContent = `Ερώτηση ${currentIndex + 1} από ${TOTAL_Q}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const letters = ['α', 'β', 'γ', 'δ'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    div.onclick = () => selectOption(i);
    container.appendChild(div);
  });

  const pct = (currentIndex / TOTAL_Q) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function selectOption(selected) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));

  const feedback = document.getElementById('feedback');
  const letters = ['α', 'β', 'γ', 'δ'];

  if (selected === q.correct) {
    opts[selected].classList.add('correct');
    feedback.className = 'feedback correct';
    document.getElementById('feedbackIcon').textContent = '✅';
    document.getElementById('feedbackText').textContent = 'Σωστά! Η απάντηση είναι σωστή.';
    correctCount++;
    history.push({ q: q.q, userAns: q.opts[selected], correctAns: q.opts[q.correct], ok: true });
  } else {
    opts[selected].classList.add('wrong');
    opts[q.correct].classList.add('show-correct');
    feedback.className = 'feedback wrong';
    document.getElementById('feedbackIcon').textContent = '❌';
    document.getElementById('feedbackText').textContent = `Λάθος! Η σωστή απάντηση είναι: ${letters[q.correct]}) ${q.opts[q.correct]}`;
    wrongCount++;
    history.push({ q: q.q, userAns: q.opts[selected], correctAns: q.opts[q.correct], ok: false });
  }

  feedback.style.display = 'flex';
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function skipQuestion() {
  if (answered) { nextQuestion(); return; }
  const q = questions[currentIndex];
  history.push({ q: q.q, userAns: '(παράλειψη)', correctAns: q.opts[q.correct], ok: false });
  wrongCount++;
  document.getElementById('wrongCount').textContent = wrongCount;
  nextQuestion();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= TOTAL_Q) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  document.getElementById('quizScreen').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';
  document.getElementById('progressFill').style.width = '100%';

  const pct = Math.round((correctCount / TOTAL_Q) * 100);
  document.getElementById('finalScore').textContent = `${correctCount} / ${TOTAL_Q}`;
  document.getElementById('finalDesc').textContent = `Απαντήσατε σωστά στο ${pct}% των ερωτήσεων.`;

  const grade = document.getElementById('gradeLabel');
  if (pct >= 90) { grade.className = 'grade excellent'; grade.textContent = '🌟 Άριστα!'; }
  else if (pct >= 70) { grade.className = 'grade good'; grade.textContent = '👍 Πολύ καλά!'; }
  else if (pct >= 50) { grade.className = 'grade average'; grade.textContent = '📚 Χρειάζεται βελτίωση'; }
  else { grade.className = 'grade poor'; grade.textContent = '⚠️ Συνεχίστε την μελέτη'; }
}

function showDetails() {
  const dt = document.getElementById('detailsTable');
  if (dt.style.display !== 'none') { dt.style.display = 'none'; return; }
  let html = `<table class="results-table"><thead><tr><th>#</th><th>Ερώτηση</th><th>Απάντησή σας</th><th>Σωστή απάντηση</th><th>Αποτέλεσμα</th></tr></thead><tbody>`;
  history.forEach((h, i) => {
    const icon = h.ok ? '✅' : '❌';
    const row_style = h.ok ? '' : 'background:#fff5f5';
    html += `<tr style="${row_style}"><td>${i+1}</td><td style="max-width:250px">${h.q}</td><td>${h.userAns}</td><td style="color:#2e7d32;font-weight:600">${h.correctAns}</td><td style="text-align:center">${icon}</td></tr>`;
  });
  html += '</tbody></table>';
  dt.innerHTML = html;
  dt.style.display = 'block';
}

function restartQuiz() {
  document.getElementById('detailsTable').style.display = 'none';
  startQuiz();
}

// Start on load
startQuiz();
