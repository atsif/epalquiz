<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - Τεχνικός Ηλεκτρολογικών Συστημάτων</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #24f28bb5;  
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #f5c542;
    --accent2: #ff6b35;
    --green: #4ade80;
    --red: #f87171;
    --text: #f0f0f0;
    --muted: #888;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    width: 100%;
    max-width: 800px;
    padding: 32px 0 16px;
    text-align: center;
  }

  header h1 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 20px 0;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat .val {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat.correct .val { color: var(--green); }
  .stat.wrong .val { color: var(--red); }

  .progress-container {
    width: 100%;
    max-width: 800px;
    background: var(--surface);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    border-radius: 4px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 800px;
    width: 100%;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s ease;
    font-size: 15px;
    line-height: 1.5;
    text-align: left;
	color: #ffffff;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: #252525;
    transform: translateX(4px);
  }

  .option .label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(245,197,66,0.1);
    border-radius: 4px;
    padding: 2px 8px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(74,222,128,0.08);
  }

  .option.correct .label {
    background: rgba(74,222,128,0.2);
    color: var(--green);
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(248,113,113,0.08);
  }

  .option.wrong .label {
    background: rgba(248,113,113,0.2);
    color: var(--red);
  }

  .option.disabled { cursor: default; }

  .true-false-btns {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .tf-btn {
    flex: 1;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s ease;
    letter-spacing: 1px;
  }

  .tf-btn:hover:not(.disabled) {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .tf-btn.true-btn:hover:not(.disabled) { border-color: var(--green); background: rgba(74,222,128,0.08); }
  .tf-btn.false-btn:hover:not(.disabled) { border-color: var(--red); background: rgba(248,113,113,0.08); }

  .tf-btn.correct { border-color: var(--green); background: rgba(74,222,128,0.15); color: var(--green); }
  .tf-btn.wrong { border-color: var(--red); background: rgba(248,113,113,0.15); color: var(--red); }
  .tf-btn.reveal-correct { border-color: var(--green); background: rgba(74,222,128,0.08); color: var(--green); }

  .feedback {
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .feedback.correct-fb {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.3);
    color: var(--green);
    display: block;
  }

  .feedback.wrong-fb {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    display: block;
  }

  .feedback strong { font-weight: 700; }

  .btn-next {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #f0f0f0; // 0d0d0d  f0f0f0
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: none;
    text-transform: uppercase;
  }

  .btn-next:hover {
    background: #e0b330;
    transform: translateY(-1px);
  }

  .btn-next.visible { display: block; }

  .btn-skip {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    border: 1.5px dashed #444;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
  }

  .btn-skip:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,107,53,0.06);
  }

  .btn-skip.hidden { display: none !important; }

  .finish-screen {
    text-align: center;
    max-width: 600px;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 32px;
    animation: slideIn 0.4s ease;
  }

  .finish-screen .score-big {
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .finish-screen .score-label {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin: 8px 0 24px;
    font-size: 14px;
  }

  .finish-screen h2 {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .finish-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 24px 0;
    flex-wrap: wrap;
  }

  .finish-stat {
    background: var(--surface);
    border-radius: 10px;
    padding: 16px 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
  }

  .finish-stat .n { font-size: 28px; font-weight: 700; }
  .finish-stat .l { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .btn-restart {
    background: var(--accent);
    color: #0d0d0d; // 0d0d0d  f0f0f0
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 16px 40px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }

  .btn-restart:hover {
    background: #e0b330;
    transform: translateY(-2px);
  }

  .hidden { display: none !important; }

  .multi-note {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    margin-bottom: 14px;
    background: rgba(255,107,53,0.1);
    border-radius: 6px;
    padding: 6px 12px;
    display: inline-block;
  }

  .submit-multi {
    margin-top: 16px;
    padding: 12px 24px;
    background: var(--surface);
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .submit-multi:hover { background: rgba(245,197,66,0.1); }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .q-text { font-size: 15px; }
    .option { font-size: 14px; }
  }

  /* ===== FILL IN THE BLANK (DRAG & DROP) ===== */
  .fill-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 2.4;
    margin-bottom: 20px;
    color: var(--text);
  }

  .fill-blank {
    display: inline-block;
    min-width: 110px;
    min-height: 28px;
    border-bottom: 2.5px dashed var(--accent);
    border-radius: 6px;
    padding: 2px 10px;
    margin: 0 3px;
    background: rgba(245,197,66,0.07);
    vertical-align: middle;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }

  .fill-blank.drag-over {
    border-color: var(--accent2);
    background: rgba(255,107,53,0.15);
    transform: scale(1.05);
  }

  .fill-blank.filled {
    border-style: solid;
    border-color: var(--muted);
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }

  .fill-blank.correct-blank {
    border-color: var(--green) !important;
    background: rgba(74,222,128,0.12) !important;
    color: var(--green) !important;
    border-style: solid !important;
  }

  .fill-blank.wrong-blank {
    border-color: var(--red) !important;
    background: rgba(248,113,113,0.12) !important;
    color: var(--red) !important;
    border-style: solid !important;
  }

  .fill-blank .blank-num {
    font-size: 9px;
    color: var(--muted);
    margin-right: 3px;
  }

  .word-bank-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    display: block;
  }

  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 16px 0 8px;
    padding: 14px;
    border: 1.5px dashed #333;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }

  .word-chip {
    background: var(--card);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    cursor: grab;
    transition: all 0.15s;
    user-select: none;
  }

  .word-chip:hover { background: rgba(245,197,66,0.1); transform: translateY(-2px); }
  .word-chip.dragging { opacity: 0.35; cursor: grabbing; }
  .word-chip.used { opacity: 0.25; pointer-events: none; border-style: dashed; color: var(--muted); border-color: var(--muted); }

  .fill-submit {
    margin-top: 14px;
    padding: 14px 28px;
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 100%;
  }

  .fill-submit:hover { background: #e0b330; transform: translateY(-1px); }
  .fill-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== MATCHING ===== */
  .match-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 8px 0 16px;
  }

  .match-col-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
    display: block;
  }

  .match-left-col, .match-right-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .match-left-item {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    min-height: 54px;
    display: flex;
    align-items: center;
    position: relative;
  }

  .match-left-item .match-idx {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-right: 8px;
    flex-shrink: 0;
  }

  .match-drop-zone {
    background: rgba(245,197,66,0.04);
    border: 2px dashed #444;
    border-radius: 10px;
    padding: 10px 14px;
    min-height: 54px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    transition: all 0.2s;
    cursor: pointer;
  }

  .match-drop-zone.drag-over {
    border-color: var(--accent2);
    background: rgba(255,107,53,0.1);
    transform: scale(1.02);
  }

  .match-drop-zone.filled {
    border-style: solid;
    border-color: var(--muted);
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }

  .match-drop-zone.correct-match {
    border-color: var(--green) !important;
    background: rgba(74,222,128,0.1) !important;
    color: var(--green) !important;
    border-style: solid !important;
  }

  .match-drop-zone.wrong-match {
    border-color: var(--red) !important;
    background: rgba(248,113,113,0.1) !important;
    color: var(--red) !important;
    border-style: solid !important;
  }

  .match-right-bank {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .match-chip {
    background: var(--card);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    cursor: grab;
    transition: all 0.15s;
    user-select: none;
    line-height: 1.4;
  }

  .match-chip:hover { background: rgba(245,197,66,0.08); transform: translateX(3px); }
  .match-chip.dragging { opacity: 0.35; }
  .match-chip.used { opacity: 0.2; pointer-events: none; border-style: dashed; color: var(--muted); border-color: var(--muted); }
  .match-chip.selected-chip { outline: 2px solid var(--accent2); background: rgba(255,107,53,0.08); }

  .match-bank-area {
    margin-top: 16px;
    padding: 14px;
    border: 1.5px dashed #333;
    border-radius: 10px;
    background: rgba(255,255,255,0.01);
  }

  @media (max-width: 560px) {
    .match-container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>⚡ Quiz <span>Ηλεκτρολόγος</span></h1>
  <p>Τεχνικός Ηλεκτρολογικών Συστημάτων, Εγκαταστάσεων και Δικτύων</p>
</header>

<div class="stats-bar">
  <div class="stat"><span>Ερώτηση</span><span class="val" id="qNum">1</span></div>
  <div class="stat correct"><span>Σωστές</span><span class="val" id="correctCount">0</span></div>
  <div class="stat wrong"><span>Λάθος</span><span class="val" id="wrongCount">0</span></div>
  <div class="stat"><span>Σύνολο</span><span class="val" id="totalAnswered">0</span></div>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<div id="quizArea" class="question-card"></div>
<div id="finishArea" class="finish-screen hidden"></div>

<a href="https://atsif.github.io/epalquiz/quiz_electrician_full.html" target="_blank" 
   style="color:#4FC3F7; text-decoration:none;">
   πάτα εδώ για όλες τις ερωτήσεις
</a>
	
<script>
 // ===================== QUESTION BANK =====================
// Ξεκινάμε το array "questions" με τις πρώτες 10 ερωτήσεις από το PDF

const questions = [];

// Ερώτηση 1 - True/False (4 υποερωτήσεις)
questions.push(
  {
    questionNumber: "1α",
    type: "tf",
    text: "Σύμβαση εργασίας, είναι η συμφωνία με την οποία ένα άτομο αναλαμβάνει να επιτελέσει ένα συγκεκριμένο έργο για άλλο άτομο ή φορέα σε καθορισμένο ή αόριστο χρονικό διάστημα αντί συμφωνημένης αμοιβής.",
    answer: true,
    explanation: "Σωστό. Αυτός είναι ο ορισμός σύμβασης εργασίας.[file:1]"
  },
  {
    questionNumber: "1β",
    type: "tf",
    text: "Ο κύκλος προκήρυξης ενός διαγωνισμού ανάθεσης έργου περιλαμβάνει το αντικείμενο του διαγωνισμού.",
    answer: true,
    explanation: "Σωστό. Το αντικείμενο περιλαμβάνεται στον κύκλο προκήρυξης.[file:1]"
  },
  {
    questionNumber: "1γ",
    type: "tf",
    text: "Η ανάθεση και η ανάληψη της εκτέλεσης ενός τεχνικού έργου περιλαμβάνει άμεσα τη συγγραφή επαγγελματικών υποχρεώσεων.",
    answer: true,
    explanation: "Σωστό. Η ανάθεση συνεπάγεται επαγγελματικές υποχρεώσεις.[file:1]"
  },
  {
    questionNumber: "1δ",
    type: "tf",
    text: "Ο ηλεκτρολόγος φέρει μόνο αστικές και ποινικές ευθύνες.",
    answer: false,
    explanation: "Λάθος. Ο ηλεκτρολόγος φέρει αστικές, ποινικές και πειθαρχικές ευθύνες.[file:1]"
  },

  // Ερώτηση 2 - Multiple Choice
  {
    questionNumber: "2",
    type: "mc",
    text: "Η αποζημίωση που θα λάβει ένας εργάτης για την απόλυσή του, μετά από χρόνο υπηρεσίας 2 μήνες έως 1 έτος, είναι:",
    options: ["5 ημερομίσθια", "15 ημερομίσθια", "Μισθός ενός μήνα", "Μισθοί 2 μηνών"],
    answer: 0,
    explanation: "Σωστό: 15 ημερομίσθια για 2 μήνες έως 1 έτος υπηρεσίας.[file:1]"
  },

  // Ερώτηση 3 - Multiple Choice
  {
    questionNumber: "3",
    type: "mc",
    text: "Η αποζημίωση που θα λάβει ένας υπάλληλος για την απόλυσή του, μετά από χρόνο υπηρεσίας 10 συμπληρωμένων ετών είναι:",
    options: ["60 ημερομίσθια", "120 ημερομίσθια", "Μισθός 1 μήνα", "Μισθοί 6 μηνών"],
    answer: 3,
    explanation: "Σωστό: Μισθοί 6 μηνών"
  },

  // Ερώτηση 4 - Multiple Choice
  {
    questionNumber: "4",
    type: "mc",
    text: "Η απόκτηση επαγγελματικής άδειας συνάδει με:",
    options: [
      "Την απόκτηση προσόντων",
      "Το δικαίωμα άσκησης επαγγέλματος",
      "Τη συγγραφή επαγγελματικών υποχρεώσεων",
      "Τα ζητήματα αμοιβής"
    ],
    answer: 1,
    explanation: "Σωστό: η επαγγελματική άδεια δίνει το δικαίωμα άσκησης επαγγέλματος."
  },

  // Ερώτηση 5 - Multiple Choice
  {
    questionNumber: "5",
    type: "mc",

// ===================== QUIZ LOGIC =====================
const TOTAL_PER_SESSION = 20;
let sessionQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let fillAnswers = {};
let selectedChipId = null;
let draggedWord = '';
let draggedChipId = '';
let matchAnswers = {};
let selectedMatchChipId = null;
let draggedMatchDef = '';
let draggedMatchChipId = '';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSession() {
  sessionQuestions = shuffle(questions).slice(0, TOTAL_PER_SESSION);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  document.getElementById('finishArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  updateStats();
  renderQuestion();
}

function updateStats() {
  document.getElementById('qNum').textContent = currentIndex + 1;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('totalAnswered').textContent = correctCount + wrongCount;
  const pct = ((currentIndex) / TOTAL_PER_SESSION) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderQuestion() {
  answered = false;
  fillAnswers = {};
  matchAnswers = {};
  selectedChipId = null;
  selectedMatchChipId = null;
  const q = sessionQuestions[currentIndex];
  const area = document.getElementById('quizArea');
  let html = `<div class="q-number">Ερώτηση ${currentIndex + 1} / ${TOTAL_PER_SESSION}</div>`;
  html += `<div class="q-questionNumber">${q.questionNumber}</div>`;

  if (q.type === 'tf') {
    html += `<div class="q-text">${q.text}</div>`;
    html += `<div class="true-false-btns">
      <button class="tf-btn true-btn" onclick="answerTF(true)">✓ ΣΩΣΤΟ</button>
      <button class="tf-btn false-btn" onclick="answerTF(false)">✗ ΛΑΘΟΣ</button>
    </div>`;
  } else if (q.type === 'mc') {
    html += `<div class="q-text">${q.text}</div>`;
    const labels = ['α', 'β', 'γ', 'δ', 'ε', 'στ'];
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      html += `<button class="option" onclick="answerMC(${i})">
        <span class="label">${labels[i]}</span>
        <span>${opt}</span>
      </button>`;
    });
    html += `</div>`;
  } else if (q.type === 'fill') {
    // Build sentence with blank slots replacing (N) ______
    let fillHtml = q.text.replace(/\((\d+)\)\s*_{2,}/g, (match, num) => {
      const idx = parseInt(num) - 1;
      return `<span class="fill-blank" id="blank-${idx}" 
        data-index="${idx}"
        ondragover="event.preventDefault(); this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="dropWord(event, ${idx})"
        onclick="clearBlank(${idx})"
        title="Κάνε drop λέξη εδώ ή κλίκ για να αφαιρέσεις">
        <span class="blank-num">(${num})</span><span class="blank-val"></span>
      </span>`;
    });
    html += `<div class="fill-text">${fillHtml}</div>`;
    
    // Word bank - shuffle the answers
    const shuffled = [...q.answer].sort(() => Math.random() - 0.5);
    html += `<span class="word-bank-label">📦 Λέξεις — σύρε στα κενά (ή κάνε κλίκ):</span>`;
    html += `<div class="word-bank" id="wordBank">`;
    shuffled.forEach((word, i) => {
      html += `<div class="word-chip" id="chip-${i}" draggable="true"
        ondragstart="dragStart(event, '${word}', 'chip-${i}')"
        ondragend="this.classList.remove('dragging')"
        onclick="clickWord('${word}', 'chip-${i}')">${word}</div>`;
    });
    html += `</div>`;
    html += `<button class="fill-submit" id="fillSubmit" onclick="answerFill()" disabled>✓ Έλεγχος απαντήσεων</button>`;
  } else if (q.type === 'match') {
    html += `<div class="q-text">${q.text}</div>`;
    // Parse matches: array of {term: definition} objects
    const terms = q.matches.map(m => Object.keys(m)[0]);
    const defs = q.matches.map(m => Object.values(m)[0]);
    const shuffledDefs = [...defs].sort(() => Math.random() - 0.5);

    html += `<div class="match-container">`;
    // Left col: terms with drop zones
    html += `<div class="match-left-col">`;
    html += `<span class="match-col-label">Στήλη Α</span>`;
    terms.forEach((term, i) => {
      html += `<div class="match-left-item">
        <span class="match-idx">${i+1}.</span>
        <span>${term}</span>
      </div>`;
    });
    html += `</div>`;

    // Right col: drop zones
    html += `<div class="match-right-col">`;
    html += `<span class="match-col-label">Αντιστοίχιση</span>`;
    terms.forEach((_, i) => {
      html += `<div class="match-drop-zone" id="matchzone-${i}" data-index="${i}"
        ondragover="event.preventDefault(); this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="dropMatch(event, ${i})"
        onclick="clickMatchZone(${i})">
        <span class="zone-val" style="color:var(--muted);font-size:12px;">— σύρε εδώ —</span>
      </div>`;
    });
    html += `</div>`;
    html += `</div>`;

    // Bank of definitions
    html += `<div class="match-bank-area">`;
    html += `<span class="match-col-label">📦 Ορισμοί — σύρε στη στήλη αντιστοίχισης (ή κλίκ):</span>`;
    html += `<div class="match-right-bank" id="matchBank">`;
    shuffledDefs.forEach((def, i) => {
      const safe = def.replace(/'/g, "\\'");
      html += `<div class="match-chip" id="mchip-${i}" draggable="true"
        ondragstart="dragMatchStart(event, '${safe}', 'mchip-${i}')"
        ondragend="this.classList.remove('dragging')"
        onclick="clickMatchChip('${safe}', 'mchip-${i}')">${def}</div>`;
    });
    html += `</div></div>`;
    html += `<button class="fill-submit" id="matchSubmit" onclick="answerMatch()" disabled>✓ Έλεγχος αντιστοιχίσεων</button>`;
  }

  html += `<div class="feedback" id="feedback"></div>`;
  html += `<button class="btn-next" id="btnNext" onclick="nextQuestion()">
    ${currentIndex < TOTAL_PER_SESSION - 1 ? 'Επόμενη Ερώτηση →' : 'Δες αποτελέσματα 🏁'}
  </button>`;
  html += `<button class="btn-skip" id="btnSkip" onclick="skipQuestion()">⏭ Παράλειψη ερώτησης</button>`;

  area.innerHTML = html;
}

function answerTF(val) {
  if (answered) return;
  answered = true;
  const q = sessionQuestions[currentIndex];
  const correct = (val === true && q.answer === "Σ") || (val === false && q.answer === "Λ");
  if (correct) correctCount++; else wrongCount++;
  
  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => b.classList.add('disabled'));

  const trueBtn = document.querySelector('.true-btn');
  const falseBtn = document.querySelector('.false-btn');

  if (correct) {
    (val ? trueBtn : falseBtn).classList.add('correct');
  } else {
    (val ? trueBtn : falseBtn).classList.add('wrong');
    (!val ? trueBtn : falseBtn).classList.add('reveal-correct');
  }

  showFeedback(correct, q.explanation);
}

function answerMC(idx) {
  if (answered) return;
  answered = true;
  const q = sessionQuestions[currentIndex];
  const correct = idx === q.answer;
  if (correct) correctCount++; else wrongCount++;

  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  opts[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) opts[q.answer].classList.add('correct');

  showFeedback(correct, q.explanation);
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = `<strong>${correct ? '✓ Σωστά!' : '✗ Λάθος!'}</strong> — ${explanation}`;
  document.getElementById('btnNext').classList.add('visible');
  const skipBtn = document.getElementById('btnSkip');
  if (skipBtn) skipBtn.classList.add('hidden');
  updateStats();
}

function skipQuestion() {
  if (answered) return;
  currentIndex++;
  if (currentIndex >= TOTAL_PER_SESSION) {
    showResults();
  } else {
    updateStats();
    renderQuestion();
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= TOTAL_PER_SESSION) {
    showResults();
  } else {
    updateStats();
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('progressBar').style.width = '100%';
  
  const pct = Math.round((correctCount / TOTAL_PER_SESSION) * 100);
  let msg = pct >= 80 ? '🏆 Εξαιρετικό!' : pct >= 60 ? '👍 Καλή δουλειά!' : '📚 Συνέχισε την εξάσκηση!';

  const area = document.getElementById('finishArea');
  area.classList.remove('hidden');
  area.innerHTML = `
    <div class="score-big">${pct}%</div>
    <div class="score-label">ποσοστό επιτυχίας</div>
    <h2>${msg}</h2>
    <div class="finish-stats">
      <div class="finish-stat">
        <div class="n" style="color:var(--green)">${correctCount}</div>
        <div class="l">Σωστές</div>
      </div>
      <div class="finish-stat">
        <div class="n" style="color:var(--red)">${wrongCount}</div>
        <div class="l">Λάθος</div>
      </div>
      <div class="finish-stat">
        <div class="n">${TOTAL_PER_SESSION}</div>
        <div class="l">Σύνολο</div>
      </div>
    </div>
    <button class="btn-restart" onclick="startSession()">🔄 Νέο Quiz</button>
  `;
}

// ===== FILL IN THE BLANK LOGIC =====

function dragStart(event, word, chipId) {
  draggedWord = word;
  draggedChipId = chipId;
  event.dataTransfer.setData('text/plain', word);
  setTimeout(() => document.getElementById(chipId)?.classList.add('dragging'), 10);
}

function dropWord(event, blankIdx) {
  event.preventDefault();
  const blank = document.getElementById('blank-' + blankIdx);
  if (!blank) return;
  blank.classList.remove('drag-over');

  // If blank already has a word, return it to bank
  if (fillAnswers[blankIdx]) {
    const oldChip = document.getElementById(fillAnswers[blankIdx].chipId);
    if (oldChip) oldChip.classList.remove('used');
  }

  fillAnswers[blankIdx] = { word: draggedWord, chipId: draggedChipId };
  blank.querySelector('.blank-val').textContent = draggedWord;
  blank.classList.add('filled');

  const chip = document.getElementById(draggedChipId);
  if (chip) chip.classList.add('used');

  checkFillReady();
  selectedChipId = null;
}

function clearBlank(blankIdx) {
  if (answered) return;
  if (!fillAnswers[blankIdx]) return;
  const chip = document.getElementById(fillAnswers[blankIdx].chipId);
  if (chip) chip.classList.remove('used');
  delete fillAnswers[blankIdx];
  const blank = document.getElementById('blank-' + blankIdx);
  blank.querySelector('.blank-val').textContent = '';
  blank.classList.remove('filled');
  checkFillReady();
}

function clickWord(word, chipId) {
  if (answered) return;
  // If already selected, deselect
  if (selectedChipId === chipId) {
    selectedChipId = null;
    document.querySelectorAll('.word-chip').forEach(c => c.style.outline = '');
    return;
  }
  selectedChipId = chipId;
  draggedWord = word;
  draggedChipId = chipId;
  document.querySelectorAll('.word-chip').forEach(c => c.style.outline = '');
  const chip = document.getElementById(chipId);
  if (chip) chip.style.outline = '2px solid var(--accent2)';
}

// Allow clicking a blank to place selected word
document.addEventListener('click', function(e) {
  const blank = e.target.closest('.fill-blank');
  if (blank && selectedChipId && !answered) {
    const idx = parseInt(blank.dataset.index);
    // simulate drop
    if (fillAnswers[idx]) {
      const oldChip = document.getElementById(fillAnswers[idx].chipId);
      if (oldChip) oldChip.classList.remove('used');
    }
    fillAnswers[idx] = { word: draggedWord, chipId: selectedChipId };
    blank.querySelector('.blank-val').textContent = draggedWord;
    blank.classList.add('filled');
    const chip = document.getElementById(selectedChipId);
    if (chip) { chip.classList.add('used'); chip.style.outline = ''; }
    selectedChipId = null;
    draggedWord = '';
    draggedChipId = '';
    checkFillReady();
  }
});

function checkFillReady() {
  const q = sessionQuestions[currentIndex];
  const allFilled = Object.keys(fillAnswers).length === q.answer.length;
  const btn = document.getElementById('fillSubmit');
  if (btn) btn.disabled = !allFilled;
}

function answerFill() {
  if (answered) return;
  answered = true;
  const q = sessionQuestions[currentIndex];
  let allCorrect = true;
  let correctNum = 0;

  q.answer.forEach((correctWord, idx) => {
    const blank = document.getElementById('blank-' + idx);
    if (!blank) return;
    const placed = fillAnswers[idx]?.word || '';
    const isRight = placed.toLowerCase().trim() === correctWord.toLowerCase().trim();
    if (isRight) { correctNum++; blank.classList.add('correct-blank'); }
    else {
      allCorrect = false;
      blank.classList.add('wrong-blank');
      // Show correct answer below
      blank.title = '✓ ' + correctWord;
    }
    blank.onclick = null;
  });

  // Disable word bank
  document.querySelectorAll('.word-chip').forEach(c => { c.draggable = false; c.onclick = null; c.style.outline = ''; });
  document.getElementById('fillSubmit').disabled = true;

  const pct = Math.round((correctNum / q.answer.length) * 100);
  const isFullCorrect = correctNum === q.answer.length;
  if (isFullCorrect) correctCount++; else wrongCount++;

  showFeedback(isFullCorrect, `${correctNum}/${q.answer.length} σωστά (${pct}%). ${q.explanation}`);
  fillAnswers = {};
}

// ===== MATCHING LOGIC =====

function dragMatchStart(event, def, chipId) {
  draggedMatchDef = def;
  draggedMatchChipId = chipId;
  event.dataTransfer.setData('text/plain', def);
  setTimeout(() => document.getElementById(chipId)?.classList.add('dragging'), 10);
}

function dropMatch(event, zoneIdx) {
  event.preventDefault();
  const zone = document.getElementById('matchzone-' + zoneIdx);
  if (!zone) return;
  zone.classList.remove('drag-over');
  placeMatchChip(zoneIdx, draggedMatchDef, draggedMatchChipId);
  selectedMatchChipId = null;
}

function placeMatchChip(zoneIdx, def, chipId) {
  // Return old chip if zone was filled
  if (matchAnswers[zoneIdx]) {
    const old = document.getElementById(matchAnswers[zoneIdx].chipId);
    if (old) { old.classList.remove('used'); old.classList.remove('selected-chip'); }
  }
  // If this chip was already placed somewhere, clear that zone
  Object.keys(matchAnswers).forEach(k => {
    if (matchAnswers[k].chipId === chipId && parseInt(k) !== zoneIdx) {
      const oldZone = document.getElementById('matchzone-' + k);
      if (oldZone) { oldZone.querySelector('.zone-val').textContent = '— σύρε εδώ —'; oldZone.querySelector('.zone-val').style.color = 'var(--muted)'; oldZone.classList.remove('filled'); }
      delete matchAnswers[k];
    }
  });

  matchAnswers[zoneIdx] = { def, chipId };
  const zone = document.getElementById('matchzone-' + zoneIdx);
  const valEl = zone.querySelector('.zone-val');
  valEl.textContent = def;
  valEl.style.color = 'var(--text)';
  zone.classList.add('filled');

  const chip = document.getElementById(chipId);
  if (chip) { chip.classList.add('used'); chip.classList.remove('selected-chip'); }

  checkMatchReady();
}

function clickMatchChip(def, chipId) {
  if (answered) return;
  if (selectedMatchChipId === chipId) {
    selectedMatchChipId = null;
    document.querySelectorAll('.match-chip').forEach(c => c.classList.remove('selected-chip'));
    return;
  }
  document.querySelectorAll('.match-chip').forEach(c => c.classList.remove('selected-chip'));
  selectedMatchChipId = chipId;
  draggedMatchDef = def;
  draggedMatchChipId = chipId;
  document.getElementById(chipId)?.classList.add('selected-chip');
}

function clickMatchZone(zoneIdx) {
  if (answered) return;
  // If a chip is selected, place it
  if (selectedMatchChipId) {
    placeMatchChip(zoneIdx, draggedMatchDef, selectedMatchChipId);
    selectedMatchChipId = null;
    draggedMatchDef = '';
    draggedMatchChipId = '';
    return;
  }
  // Otherwise clear the zone
  if (matchAnswers[zoneIdx]) {
    const chip = document.getElementById(matchAnswers[zoneIdx].chipId);
    if (chip) chip.classList.remove('used');
    delete matchAnswers[zoneIdx];
    const zone = document.getElementById('matchzone-' + zoneIdx);
    zone.querySelector('.zone-val').textContent = '— σύρε εδώ —';
    zone.querySelector('.zone-val').style.color = 'var(--muted)';
    zone.classList.remove('filled');
    checkMatchReady();
  }
}

function checkMatchReady() {
  const q = sessionQuestions[currentIndex];
  const allFilled = Object.keys(matchAnswers).length === q.matches.length;
  const btn = document.getElementById('matchSubmit');
  if (btn) btn.disabled = !allFilled;
}

function answerMatch() {
  if (answered) return;
  answered = true;
  const q = sessionQuestions[currentIndex];
  const terms = q.matches.map(m => Object.keys(m)[0]);
  const correctDefs = q.matches.map(m => Object.values(m)[0]);
  let correctNum = 0;

  terms.forEach((_, i) => {
    const zone = document.getElementById('matchzone-' + i);
    if (!zone) return;
    const placed = matchAnswers[i]?.def || '';
    const isRight = placed.trim() === correctDefs[i].trim();
    if (isRight) { correctNum++; zone.classList.add('correct-match'); }
    else {
      zone.classList.add('wrong-match');
      // Show correct answer as tooltip
      zone.title = '✓ ' + correctDefs[i];
    }
    zone.onclick = null;
  });

  document.querySelectorAll('.match-chip').forEach(c => { c.draggable = false; c.onclick = null; c.classList.remove('selected-chip'); });
  document.getElementById('matchSubmit').disabled = true;

  const isFullCorrect = correctNum === q.matches.length;
  const pct = Math.round((correctNum / q.matches.length) * 100);
  if (isFullCorrect) correctCount++; else wrongCount++;

  showFeedback(isFullCorrect, `${correctNum}/${q.matches.length} σωστές αντιστοιχίσεις (${pct}%). ${q.explanation}`);
  matchAnswers = {};
}

// Start!
startSession();
</script>
